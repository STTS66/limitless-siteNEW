services:
  - type: web
    name: limitless-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains:
      - limitless.pp.ua
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://limitless-api.onrender.com

  - type: web
    name: limitless-api
    runtime: rust
    rootDir: rust-backend
    buildCommand: cargo build --release
    startCommand: ./target/release/limitless-backend
    healthCheckPath: /api/health
    envVars:
      - key: BOT_API_URL
        fromService:
          type: web
          name: limitless-telegram-api
          property: hostport
      - key: PROMPT_CONFIG_PATH
        value: /var/data/prompt-config.json
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: prompt-config-disk
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: limitless-telegram-api
    runtime: python
    rootDir: telegram-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: PAY_SUPPORT_CONTACT
        value: https://t.me/LimitlessSupport_bot
      - key: AUTH_DB_PATH
        value: /var/data/auth.db
      - key: LEGACY_JSON_PATH
        value: /var/data/tokens_db.json
    disk:
      name: telegram-auth-disk
      mountPath: /var/data
      sizeGB: 1
